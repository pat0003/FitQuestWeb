name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============================================================
  # Job 1: backend — install, verify startup
  # ============================================================
  backend:
    name: Backend check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Verify syntax
        run: node --check src/index.js
      - name: Run unit tests
        run: npm test

  # ============================================================
  # Job 2: frontend — install, build (vite)
  # ============================================================
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build (vite)
        run: npm run build

  # ============================================================
  # Job 3: docker-build — verifica che le immagini si costruiscano
  # Gate: parte solo se backend e frontend passano
  # ============================================================
  docker-build:
    name: Docker images build
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build all images via compose
        run: docker compose build
