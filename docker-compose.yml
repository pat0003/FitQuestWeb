services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:3000/api

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://fitquest:fitquest@db:5432/fitquest
      - JWT_SECRET=dev-secret-change-in-production
      - CORS_ORIGIN=http://localhost
      - PORT=3000

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=fitquest
      - POSTGRES_PASSWORD=fitquest
      - POSTGRES_DB=fitquest
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./database/seed_exercises.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
      - ./database/03_alter.sql:/docker-entrypoint-initdb.d/03_alter.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitquest"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
